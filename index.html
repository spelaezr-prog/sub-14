<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting EFC - Cantera de Héroes</title>
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --efc-orange: #f37021; --efc-green: #008f39; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; color: white; }

        .toolbar { width: 100%; max-width: 500px; margin-bottom: 15px; display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        select { background: #333; color: white; border: 1px solid var(--efc-orange); padding: 10px; border-radius: 8px; font-size: 14px; flex-grow: 1; outline: none; }
        .btn-download { background: var(--efc-green); color: white; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        
        .setup-zone { background: #222; padding: 10px; border-radius: 10px; font-size: 11px; text-align: center; width: 100%; max-width: 500px; margin-bottom: 10px; border: 1px dashed var(--efc-orange); box-sizing: border-box; }

        #canvas-wrapper { width: 100%; max-width: 500px; position: relative; }
        #canvas-container { position: relative; width: 100%; aspect-ratio: 500 / 720; background-color: #1a4d2e; border: 5px solid #fff; border-radius: 15px; overflow: hidden; }

        #club-logo { position: absolute; top: 2.5%; right: 3.5%; width: 17%; height: auto; z-index: 25; display: none; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        #team-title { position: absolute; top: 4%; width: 100%; text-align: center; color: #fff; font-size: 24px; font-weight: 900; text-transform: uppercase; text-shadow: 0 4px 8px #000; z-index: 10; outline: none; padding: 0 65px; box-sizing: border-box; }

        .pitch-line { position: absolute; border: 2.5px solid rgba(255,255,255,0.4); pointer-events: none; }
        #half-line { width: 100%; top: 50%; border-top: 2.5px solid rgba(255,255,255,0.4); }
        #center-circle { width: 30%; aspect-ratio: 1; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #area-top { width: 56%; height: 16%; top: -2px; left: 50%; transform: translateX(-50%); border-top: none; }
        #area-bottom { width: 56%; height: 16%; bottom: -2px; left: 50%; transform: translateX(-50%); border-bottom: none; }

        .player-unit { position: absolute; text-align: center; width: 23%; transform: translate(-50%, -50%); z-index: 5; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .dot { width: 26px; height: 26px; background: var(--efc-orange); border: 2.5px solid #fff; border-radius: 50%; margin: 0 auto 5px auto; }
        .gk .dot { background: #f1c40f; }
        .name-box { background: rgba(0,0,0,0.85); padding: 4px; border-radius: 7px; width: 100%; border: 1px solid rgba(255,255,255,0.2); }
        .starter { color: #fff; font-size: 14px; font-weight: 800; display: block; outline: none; white-space: nowrap; overflow: hidden; }
        .sub { color: #00ff6a; font-size: 10px; font-style: italic; display: block; border-top: 1px solid rgba(255,255,255,0.3); margin-top: 3px; outline: none; min-height: 10px; }

        /* POSICIONES FIJAS */
        #p1 { top: 92%; left: 50%; } /* GK */
        #p2 { top: 74%; left: 14%; } /* DFI */
        #p3 { top: 83%; left: 34%; } /* DFC1 */
        #p4 { top: 83%; left: 66%; } /* DFC2 */
        #p5 { top: 74%; left: 86%; } /* DFD */
        #p8 { top: 34%; left: 14%; } /* EXTREMO IZQ */
        #p10{ top: 34%; left: 86%; } /* EXTREMO DER */
        #p11{ top: 16%; left: 50%; } /* DC */

        /* EL TRIÁNGULO DINÁMICO RECONFIGURADO */
        /* 1-4-2-3-1 */
        .form-4231 #p6 { top: 58%; left: 35%; } /* Pivote Izquierdo */
        .form-4231 #p7 { top: 58%; left: 65%; } /* Pivote Derecho */
        .form-4231 #p9 { top: 40%; left: 50%; } /* Enganche */

        /* 1-4-3-3 */
        .form-433 #p6 { top: 48%; left: 32%; } /* Sube a ser Interior Izq */
        .form-433 #p7 { top: 62%; left: 50%; } /* Se centra como Pivote Único */
        .form-433 #p9 { top: 48%; left: 68%; } /* Se abre a ser Interior Der */
    </style>
</head>
<body>

    <div id="setup-ui" class="setup-zone">
        <p>Configura el escudo de Envigado FC una última vez:</p>
        <input type="file" accept="image/*" onchange="saveLogoPermanently(event)">
    </div>

    <div class="toolbar">
        <select id="formation-select" onchange="updateFormation()">
            <option value="form-4231">1-4-2-3-1</option>
            <option value="form-433">1-4-3-3</option>
        </select>
        <button class="btn-download" onclick="saveImage()">Descargar</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container" class="form-4231">
            <img id="club-logo" src="">
            <div id="team-title" contenteditable="true" oninput="saveData()">ENVIGADO FC</div>
            <div class="pitch-line" id="half-line"></div>
            <div class="pitch-line" id="center-circle"></div>
            <div class="pitch-line" id="area-top"></div>
            <div class="pitch-line" id="area-bottom"></div>
            <div id="players-on-pitch"></div>
        </div>
    </div>

    <script>
        const initialPositions = [
            {id: 'p1', class: 'gk', t: 'PORTERO'}, {id: 'p2', class: '', t: 'LATERAL IZQ'},
            {id: 'p3', class: '', t: 'CENTRAL IZQ'}, {id: 'p4', class: '', t: 'CENTRAL DER'},
            {id: 'p5', class: '', t: 'LATERAL DER'}, {id: 'p6', class: '', t: 'PIVOTE IZQ'},
            {id: 'p7', class: '', t: 'PIVOTE DER'}, {id: 'p8', class: '', t: 'EXTREMO IZQ'},
            {id: 'p9', class: '', t: 'ENGANCHE'}, {id: 'p10', class: '', t: 'EXTREMO DER'},
            {id: 'p11', class: '', t: 'DELANTERO'}
        ];

        window.onload = () => {
            const logo = localStorage.getItem('efc_logo_vfinal');
            if (logo) {
                const img = document.getElementById('club-logo');
                img.src = logo;
                img.style.display = 'block';
                document.getElementById('setup-ui').style.display = 'none';
            }

            const pitch = document.getElementById('players-on-pitch');
            const savedData = JSON.parse(localStorage.getItem('efc_data_' + window.location.pathname)) || {};

            initialPositions.forEach(p => {
                const pData = savedData[p.id] || { t: p.t, s: 'SUPLENTE' };
                pitch.innerHTML += `
                    <div class="player-unit ${p.class}" id="${p.id}">
                        <div class="dot"></div>
                        <div class="name-box">
                            <span class="starter" contenteditable="true" oninput="saveData()">${pData.t}</span>
                            <span class="sub" contenteditable="true" oninput="saveData()">${pData.s}</span>
                        </div>
                    </div>`;
            });

            if(savedData.teamTitle) document.getElementById('team-title').innerText = savedData.teamTitle;
            if(savedData.formation) {
                document.getElementById('formation-select').value = savedData.formation;
                document.getElementById('canvas-container').className = savedData.formation;
            }
        };

        function saveData() {
            const data = {
                teamTitle: document.getElementById('team-title').innerText,
                formation: document.getElementById('formation-select').value
            };
            initialPositions.forEach(p => {
                data[p.id] = {
                    t: document.querySelector(`#${p.id} .starter`).innerText,
                    s: document.querySelector(`#${p.id} .sub`).innerText
                };
            });
            localStorage.setItem('efc_data_' + window.location.pathname, JSON.stringify(data));
        }

        function updateFormation() {
            document.getElementById('canvas-container').className = document.getElementById('formation-select').value;
            saveData();
        }

        function saveLogoPermanently(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                localStorage.setItem('efc_logo_vfinal', reader.result);
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('team-title').innerText;
            html2canvas(container, { scale: 3, useCORS: true, backgroundColor: "#1a4d2e" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
